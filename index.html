<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soul Space Chennai</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  color:white;
  text-align:center;

  background: url('https://images.unsplash.com/photo-1511920170033-f8396924c348?q=80&w=1600') no-repeat center center/cover;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* FIXED HEADER (LOGO STAYS) */
.header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.header img{
  width:140px;
}

/* CONTAINER */
.container{
  margin-top:120px;
  padding:25px;
  max-width:750px;
  margin-left:auto;
  margin-right:auto;

  background: rgba(255,255,255,0.06);
  border-radius:25px;
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

/* TITLE - ONE LINE */
h1{
  font-size:32px;
  font-weight:600;
  letter-spacing:1px;
  margin-bottom:10px;
}

/* STORY */
.story{
  font-size:16px;
  line-height:1.7;
  opacity:0.9;
}

/* POSTER */
.poster img{
  width:100%;
  border-radius:20px;
  margin-top:20px;
}

/* BUTTON */
.button{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;

  margin:15px auto;
  padding:14px;
  width:85%;

  background: linear-gradient(135deg,#ff2d55,#ff6a88);
  border-radius:30px;
  text-decoration:none;
  color:white;

  font-weight:500;
  transition:0.3s;
}
.button:hover{
  transform:scale(1.05);
}

/* TEXTAREA */
textarea{
  width:90%;
  height:120px;
  border-radius:12px;
  padding:12px;
  border:none;
  margin-top:15px;

  background:rgba(255,255,255,0.1);
  color:white;
}

/* SUBMIT */
.submit{
  margin-top:12px;
  padding:14px 30px;
  border:none;
  border-radius:30px;

  background:linear-gradient(135deg,#00c853,#69f0ae);
  color:white;
  font-weight:bold;
}

/* WALL */
.wall{
  margin-top:25px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:15px;
  text-align:left;
}
</style>
</head>

<body>

<!-- FIXED LOGO -->
<div class="header">
  <img src="logo.png">
</div>

<div class="container">

<h1>🌿 Soul Space Chennai</h1>

<div class="story">
  <p>A safe space where people share feelings without judgement.</p>
  <p>With chai, music and real conversations, every story becomes lighter.</p>
  <p><b>You're not alone anymore. We're here for you.</b></p>
</div>

<div class="poster">
  <img src="poster.jpg">
</div>

<a class="button" href="https://instagram.com/soulspacechennai">
  <i class="fab fa-instagram"></i> Follow on Instagram
</a>

<a class="button" href="https://wa.me/916380896485">
  <i class="fab fa-whatsapp"></i> Chat / Book Tickets
</a>

<h2>💭 Share Your Feelings</h2>

<textarea id="msg" placeholder="Write your feelings..."></textarea>
<br>

<button class="submit" onclick="sendMessage()">Share 💚</button>

<h2>💬 Shared Feelings</h2>
<div id="wall" class="wall"></div>

</div>

<script>
let wall = document.getElementById("wall");

window.onload = function(){
  let saved = JSON.parse(localStorage.getItem("feelings")) || [];
  saved.forEach(addToWall);
};

function sendMessage(){
  let message = document.getElementById("msg").value;

  if(message.trim() === ""){
    alert("Write something...");
    return;
  }

  let saved = JSON.parse(localStorage.getItem("feelings")) || [];
  saved.push(message);
  localStorage.setItem("feelings", JSON.stringify(saved));

  addToWall(message);
  document.getElementById("msg").value="";
}

function addToWall(text){
  let div = document.createElement("div");
  div.className="card";
  div.innerText=text;

  wall.prepend(div);
}
</script>

</body>
</html>
