<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soul Space Chennai</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
color:white;
text-align:center;
background:#0f0f0f;
}

.container{
padding:25px;
max-width:750px;
margin:auto;
}

/* 🔥 BIG LOGO */
.logo img{
width:230px;
max-width:90%;
margin-top:20px;
border-radius:15px;
display:block;
margin-left:auto;
margin-right:auto;
}

/* TITLE */
h1{
font-size:34px;
margin-top:10px;
}

/* STORY */
.story{
font-size:17px;
line-height:1.6;
margin-top:20px;
opacity:0.9;
}

/* 🔥 BIG POSTER */
.poster img{
width:100%;
max-width:700px;
border-radius:20px;
margin-top:25px;
display:block;
margin-left:auto;
margin-right:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

/* BUTTONS */
.button{
display:block;
margin:15px auto;
padding:15px;
width:85%;
background:#ff2d55;
color:white;
text-decoration:none;
border-radius:30px;
font-size:17px;
font-weight:500;
}

/* TEXTAREA */
textarea{
width:90%;
height:120px;
border-radius:12px;
padding:12px;
border:none;
margin-top:15px;
font-size:14px;
}

/* SEND BUTTON */
.submit{
margin-top:12px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#00c853;
color:white;
font-size:16px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<!-- 🔥 LOGO -->
<div class="logo">
<img src="logo.png" alt="Soul Space Logo">
</div>

<h1>🌿 Soul Space Chennai</h1>

<div class="story">
<p>A safe place where people share feelings without judgement.</p>
<p>With chai, music and real conversations, every story becomes lighter.</p>
<p><b>You're not alone anymore. We're here for you.</b></p>
</div>

<!-- 🔥 POSTER -->
<div class="poster">
<img src="poster.jpg" alt="Soul Space Poster">
</div>

<!-- BUTTONS -->
<a class="button" href="https://instagram.com/soulspacechennai">
📸 Follow on Instagram
</a>

<a class="button" href="https://wa.me/916380896485">
💬 Chat / Book Tickets
</a>

<!-- FEELINGS -->
<h2>💭 Share Your Feelings</h2>

<textarea id="msg" placeholder="Write your feelings here..."></textarea>

<br>

<button class="submit" onclick="sendToWhatsApp()">
Share Your Feelings 💚
</button>

</div>

<script>

function sendToWhatsApp(){

let message = document.getElementById("msg").value;

if(message.trim() === ""){
alert("Please write something...");
return;
}

/* YOUR NUMBER */
let phone = "916380896485";

/* AUTO MESSAGE FORMAT */
let finalMessage = "Hi Soul Space, I want to share this feeling:\n\n" + message;

let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(finalMessage);

window.open(url, "_blank");

}

</script>

</body>
</html>
