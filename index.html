<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soul Space Chennai</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top left,#1b2a2f,#0f2027 40%),
            radial-gradient(circle at bottom right,#2c5364,#0f2027 60%);
color:white;
min-height:100vh;
}

/* SOFT LIGHT GLOW */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05), transparent 40%);
z-index:-1;
}

/* LOGO */
.logo-container{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
z-index:1000;
}

.logo{
width:130px; /* PERFECT MEDIUM SIZE */
}

/* MAIN */
.main{
padding:130px 16px 30px;
text-align:center;
}

/* TEXT */
.title{
font-size:22px;
margin-bottom:6px;
}

.desc{
font-size:14px;
line-height:1.6;
color:#e6f0f2;
margin-bottom:16px;
}

/* BUTTONS */
.btn{
display:block;
width:100%;
padding:14px;
margin-top:12px;
border-radius:25px;
text-decoration:none;
color:white;
font-size:14px;
}

.wa{background:#25D366;}
.ig{background:#E1306C;}

/* CARD */
.card{
margin-top:22px;
padding:16px;
background: rgba(255,255,255,0.07);
border-radius:16px;
backdrop-filter: blur(10px);
}

/* TEXTAREA */
textarea{
width:100%;
height:90px;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
}

/* SEND BUTTON */
.send{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:white;
color:black;
}

/* FOOTER */
.footer{
margin-top:25px;
font-size:13px;
}

.footer a{
color:white;
text-decoration:none;
margin:0 8px;
}
</style>
</head>

<body>

<div class="logo-container">
<img src="logo.png" class="logo">
</div>

<div class="main">

<div class="title">Soul Space Chennai™</div>

<div class="desc">
Unspoken thoughts. Silent pain.<br>
You don’t have to carry it alone.
</div>

<a href="https://wa.me/916380896485" class="btn wa">Chat on WhatsApp</a>
<a href="https://instagram.com/soulspacechennai" class="btn ig">Follow on Instagram</a>

<div class="card">
<p>Share what you're feeling… 🤍</p>

<textarea id="msg" placeholder="Write anything you're going through..."></textarea>

<button class="send" onclick="sendMsg()">Send</button>
</div>

<div class="footer">
<a href="contact.html">Contact</a> |
<a href="terms.html">Terms</a>
</div>

</div>

<script>
function sendMsg(){
let message = document.getElementById("msg").value;

let finalMsg = "Hey Soul Space, I want to share this:\n\n" + message;

let url = "https://wa.me/916380896485?text=" + encodeURIComponent(finalMsg);

window.open(url, "_blank");
}
</script>

</body>
</html>
