<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soul Space Chennai</title>

<style>

/* 🌑 PREMIUM BACKGROUND */
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
color:white;
text-align:center;
background: radial-gradient(circle at top, #1a1a1a, #000);
}

/* MAIN CONTAINER */
.container{
padding:25px;
max-width:700px;
margin:auto;
}

/* LOGO */
..logo{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:20px;
}

.logo img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
box-shadow:none;
}

.brand{
font-size:20px;
font-weight:bold;
color:#ff2d55;
}

/* TITLE */
h1{
font-size:38px;
margin-top:10px;
letter-spacing:1px;
}

/* STORY */
.story{
font-size:17px;
line-height:1.7;
margin-top:20px;
opacity:0.9;
}

/* POSTER */
.poster img{
width:60%;
border-radius:20px;
margin-top:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

/* BUTTONS */
.button{
display:block;
margin:15px auto;
padding:15px;
width:85%;
background: linear-gradient(45deg,#ff2d55,#ff6a88);
color:white;
text-decoration:none;
border-radius:30px;
font-size:17px;
font-weight:bold;
transition:0.3s;
}

.button:hover{
transform:scale(1.05);
}

/* TEXTAREA */
textarea{
width:90%;
height:120px;
border-radius:15px;
padding:12px;
border:none;
margin-top:10px;
}

/* SUBMIT */
.submit{
margin-top:12px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#00c853;
color:white;
font-size:16px;
}

/* DASHBOARD PUBLIC */
.dashboard{
margin-top:30px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="logo">
  <img src="logo.png" alt="logo">
  <span class="brand">Soul Space</span>
</div>

<h1>🌿 Soul Space Chennai</h1>

<div class="story">
<p>A safe space where feelings are heard, not judged.</p>
<p>With chai, music and open hearts, every story finds peace.</p>
<p><b>You're not alone anymore. We're here for you.</b></p>
</div>

<!-- POSTER -->
<div class="poster">
<img src="poster.jpg">
</div>

<!-- BUTTONS -->
<a class="button" href="https://instagram.com/soulspacechennai">
📸 Follow on Instagram
</a>

<a class="button" href="https://wa.me/916380896485">
💬 Chat / Book Tickets
</a>

<!-- FEELINGS -->
<h2>💭 Share Your Feelings</h2>

<textarea id="msg" placeholder="Write your feelings here..."></textarea>

<br>

<button class="submit" onclick="sendWhatsApp()">Send to Soul Space 💚</button>

<!-- 🌍 PUBLIC DASHBOARD -->
<div class="dashboard">

<h3>🌍 Community Activity</h3>

<p>Visitors:</p>
<img src="https://api.visitorbadge.io/api/visitors?path=soulspacechennai&countColor=%23ff2d55" />

<p id="count"></p>

</div>

</div>

<script>

/* 📲 SEND TO WHATSAPP */
function sendWhatsApp(){

let msg = document.getElementById("msg").value;

if(msg.trim() === ""){
alert("Write something 💭");
return;
}

let url = "https://wa.me/916380896485?text=" + encodeURIComponent(msg);

window.open(url, "_blank");

/* Save count locally */
let count = localStorage.getItem("count") || 0;
count++;
localStorage.setItem("count", count);

document.getElementById("count").innerText = "People shared: " + count;

}

/* LOAD COUNT */
let count = localStorage.getItem("count") || 0;
document.getElementById("count").innerText = "People shared: " + count;

</script>

</body>
</html>
