<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
padding-top:100px;
}
input{
padding:10px;
margin:10px;
border-radius:10px;
border:none;
}
button{
padding:10px 20px;
background:#ff2d55;
color:white;
border:none;
border-radius:20px;
}
</style>
</head>

<body>

<h1>🔐 Soul Space Admin</h1>

<input id="raavanayadav07@gmail.com" placeholder="raavanayadav07@gmail.com"><br>
<input id="12345" type="12345" placeholder="12345"><br>

<button onclick="login()">Login</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "12345",
  authDomain: "soulspace",
  projectId: "balaji@"
};

firebase.initializeApp(firebaseConfig);

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, pass)
  .then(()=>{
    window.location="dashboard.html";
  })
  .catch(()=>alert("Wrong login"));
}
</script>

</body>
</html>
